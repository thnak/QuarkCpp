# Quark CI — the correctness + performance gate.
#
#  * test:         builds and runs the full ctest suite across the four verified configurations
#               (gcc Release, clang Release, ASan+UBSan, TSan), each crossed against BOTH x86-64
#               and arm64 hosted runners — the same clean-from-scratch matrix used locally, now
#               also on real AArch64 hardware. A red test here blocks the merge on either arch.
#               The arm64 leg is what several TODO(arm64) comments in the core (mailbox.hpp,
#               engine.hpp, stream_channel.hpp, stream_activation.hpp, reply_stream.hpp,
#               hot_cell.hpp) are waiting on: TSan-on-arm64 is the weak-memory re-gate for the
#               `store_load_barrier()` Dekker close-outs those specs flag as x86-TSO-proven only.
#               GitHub's Linux arm64 hosted runners (`ubuntu-24.04-arm`) are free for public repos
#               (GA since 2025-08) — no self-hosted runner or QEMU emulation needed.
#  * test-windows: the Windows/x86-64 PAL backend (pal/windows_x86_64/) correctness leg, on
#               `windows-latest` (MSVC). `msvc-release` blocks the merge, same as the Linux/arm64
#               legs. `msvc-asan` is continue-on-error: MSVC's `/fsanitize=address` is real but has
#               not yet been proven clean against this codebase the way the Linux ASan+UBSan leg has
#               — it collects real signal without gating merges until that's established. TSan/UBSan
#               have no MSVC equivalent, so Windows carries no analogue of those legs; that gap stays
#               Linux/arm64-only. No perf-gate on Windows: 023's Hard budgets are pinned to the
#               x86-64 Linux reference machine (023 §"The reference machine"), same reasoning that
#               already keeps arm64's perf-gate informational-only.
#  * perf-gate: builds the 023 microbenchmarks and runs bench/ci_bench_gate.sh, which FAILS the job
#               on a Hard-budget violation ([MISS]) and only WARNS on a Goal regression
#               ([hard]/[floor]) — 023 §"Regression gating": "fails when a Hard budget is violated,
#               or a Goal metric regresses beyond a noise band." On a shared (noisy) runner the
#               hard-veto is the trustworthy signal; the ns-scale Goal numbers are a reference-machine
#               concern (023 §"The reference machine"), so they annotate, they do not block. The
#               arm64 leg is INFORMATIONAL ONLY (continue-on-error): 023's Hard budgets are pinned to
#               the x86-64 reference machine and the ARM64 ratio is explicitly provisional pending a
#               real re-baseline — arm64 numbers here are collected for that future re-baseline, not
#               enforced as a merge gate yet.
#
# Toolchain: Quark is C++23 and is verified on g++-14.2 + clang-20.1 (CONVENTIONS.md). The setup step
# installs g++-14 and LLVM 20; bump these together with the locally-verified compilers. Both are
# available from the same apt sources on arm64 Ubuntu 24.04 — no per-arch toolchain substitution.
# Windows uses whatever MSVC ships on `windows-latest` (no pinned version); QuarkWarnings.cmake asks
# for `/std:c++latest` rather than a fixed `/std:c++NN`, so it tracks whatever C++23 support that
# toolset has, the same way the bring-up box (a newer/preview MSVC lacking a literal `/std:c++23`
# flag) was verified.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.config.name }}, ${{ matrix.arch }})
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    # Safety net: the arm64 gcc/clang-release legs were observed to hang indefinitely (a real
    # non-termination, not just "slow") and got silently killed only by GitHub's 6h job cap. A
    # per-test ctest --timeout (below) is the primary fix; this is the backstop.
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, arm64]
        config:
          - name: gcc-release
            cxx: g++-14
            build_type: Release
            sanitize: ""
            build_jobs: 2
            ctest_jobs: 2
          - name: clang-release
            cxx: clang++-20
            build_type: Release
            sanitize: ""
            build_jobs: 2
            ctest_jobs: 2
          - name: asan-ubsan
            cxx: g++-14
            build_type: Debug
            sanitize: "address;undefined"
            build_jobs: 2
            ctest_jobs: 2
            # detect_leaks on; the one deliberate-OOB control sets its own ASAN_OPTIONS in CMake.
            ctest_env: "ASAN_OPTIONS=abort_on_error=0 UBSAN_OPTIONS=print_stacktrace=1:halt_on_error=1"
          - name: tsan
            cxx: g++-14
            build_type: Debug
            sanitize: "thread"
            # A clean TSan COMPILE is memory-heavy — build serially so a limited-RAM runner does not
            # OOM-kill the compiler (mirrors the local -j1 TSan rule). Tests are memory-light: -j2.
            build_jobs: 1
            ctest_jobs: 2
            ctest_env: "TSAN_OPTIONS=halt_on_error=0:second_deadlock_stack=1"
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-14 cmake ninja-build gdb
          if [[ "${{ matrix.config.cxx }}" == clang++* ]]; then
            wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- 20
            sudo apt-get install -y clang-20 libc++-20-dev libc++abi-20-dev || true
          fi

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.config.build_type }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.config.cxx }} \
            ${SAN:+-DQUARK_SANITIZE="$SAN"}
        env:
          SAN: ${{ matrix.config.sanitize }}

      - name: Build
        run: cmake --build build -j ${{ matrix.config.build_jobs }}

      # DIAGNOSTIC (temporary): arm64 gcc/clang-release hung indefinitely on
      # topology_fifo_under_relay_test — ASan/TSan on the same arch complete it fine (slowly),
      # which points at a real non-termination the sanitizers' instrumentation happens to mask,
      # not mere arm64 slowness. Run the binary directly with a wall-clock cap and, if it is still
      # alive past that cap, attach gdb and dump every thread's stack before killing it. Best
      # effort: never fails the job, so the real ctest run below still gets a bounded, clean signal.
      - name: Diagnose potential hang (arm64 release only)
        if: matrix.arch == 'arm64' && matrix.config.sanitize == ''
        run: |
          BIN=build/tests/topology_fifo_under_relay_test
          if [[ -x "$BIN" ]]; then
            "$BIN" >/tmp/fifo_out.log 2>&1 &
            pid=$!
            for i in $(seq 1 60); do
              if ! kill -0 "$pid" 2>/dev/null; then break; fi
              sleep 1
            done
            if kill -0 "$pid" 2>/dev/null; then
              echo "::warning::topology_fifo_under_relay_test still running after 60s on $(uname -m) — capturing thread backtraces"
              sudo gdb -p "$pid" -batch -ex "set pagination off" -ex "thread apply all bt" -ex detach -ex quit 2>&1 || true
              kill -9 "$pid" 2>/dev/null || true
            else
              echo "topology_fifo_under_relay_test exited on its own within 60s (exit $(wait "$pid"; echo $?))"
            fi
            echo "--- stdout/stderr ---"
            cat /tmp/fifo_out.log
          fi

      - name: Test
        run: ${{ matrix.config.ctest_env }} ctest --test-dir build -j ${{ matrix.config.ctest_jobs }} --output-on-failure --timeout 1800

      - name: Upload ctest logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-${{ matrix.config.name }}-${{ matrix.arch }}
          path: build/Testing/**/*.log
          if-no-files-found: ignore

  test-windows:
    name: test-windows (${{ matrix.config.name }})
    runs-on: windows-latest
    timeout-minutes: 90
    continue-on-error: ${{ matrix.config.informational }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: msvc-release
            sanitize: ""
            informational: false
          - name: msvc-asan
            sanitize: "address"
            # Not yet a proven-clean gate the way the Linux ASan+UBSan leg is (019 bring-up used
            # msvc-release only) — collects real signal without blocking merges until established.
            informational: true
    steps:
      - uses: actions/checkout@v4

      # The default CMake generator on windows-latest is the installed Visual Studio toolset
      # (MSBuild-driven) — no vcvarsall/Developer-Prompt setup needed, unlike a manual Ninja build.
      - name: Configure
        shell: cmd
        run: |
          cmake -S . -B build -A x64 -DQUARK_BUILD_BENCH=OFF ^
            ${{ matrix.config.sanitize != '' && format('-DQUARK_SANITIZE={0}', matrix.config.sanitize) || '' }}

      # Multi-config generator (VS/MSBuild): --config is required on both build and ctest below.
      - name: Build
        shell: cmd
        run: cmake --build build --config Release -j 4

      - name: Test
        shell: cmd
        # -j 2, not 4: matches the Linux legs' ctest_jobs (also sized to the runner's real core count,
        # not saturated) — a real-hardware contention experiment (pinning ctest -j4 to ~2 cores) showed
        # ctest's own process-level -j undercounts true concurrency here, since several tests are
        # themselves multi-threaded; RUN_SERIAL on the specific busy-spin tests (tests/CMakeLists.txt)
        # is the primary fix, this just avoids adding MORE process-level contention on top of that.
        run: ctest --test-dir build -C Release -j 2 --output-on-failure --timeout 1800

      - name: Upload ctest logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-${{ matrix.config.name }}-windows
          path: build/Testing/**/*.log
          if-no-files-found: ignore

  perf-gate:
    name: perf-gate (023 budgets, x86-64)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-14 cmake

      - name: Configure (gcc Release + bench gate)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=g++-14 -DQUARK_BENCH_CI_GATE=ON

      - name: Build benches + run 023 gate
        # The custom target builds every *_bench then runs ci_bench_gate.sh: exit non-zero ONLY on a
        # Hard-budget [MISS]; Goal regressions are printed as warnings and keep the job green.
        run: cmake --build build --target bench-gate -j 2

  perf-gate-arm64:
    name: perf-gate (023 budgets, arm64, informational)
    runs-on: ubuntu-24.04-arm
    # 023's Hard budgets are pinned to the x86-64 reference machine and the ARM64 ratio is explicitly
    # provisional (023 §"The reference machine"). Collect real arm64 numbers for that future
    # re-baseline without letting shared-runner arm64 noise veto merges.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-14 cmake

      - name: Configure (gcc Release + bench gate)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=g++-14 -DQUARK_BENCH_CI_GATE=ON

      - name: Build benches + run 023 gate (informational)
        run: cmake --build build --target bench-gate -j 2
